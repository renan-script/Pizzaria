services:
  db:
    image: postgres:18-alpine
    container_name: pizzaria_postgres
    restart: always
    environment:
      POSTGRES_USER: renan
      POSTGRES_PASSWORD: adm123
      POSTGRES_DB: sujeito_pizzaria
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: