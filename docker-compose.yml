version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: pizzaria_postgres
    restart: always
    environment:
      POSTGRES_USER: renan
      POSTGRES_PASSWORD: sua_senha_secreta
      POSTGRES_DB: sujeito_pizzaria
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: